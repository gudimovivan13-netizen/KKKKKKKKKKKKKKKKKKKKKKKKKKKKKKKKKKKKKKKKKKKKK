<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fish CEO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#020617,#020617,#020617,#020617,#020617);
color:white;
text-align:center;
overflow-x:hidden;
}

/* верхняя панель */

.topbar{
padding:15px;
background:#020617;
border-bottom:1px solid #0ea5e9;
}

.balance{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

.energy{
opacity:0.8;
}

/* рыба */

#fish{
width:55vw;
max-width:240px;
margin-top:30px;
cursor:pointer;
transition:transform .1s;
filter:drop-shadow(0 0 10px #0ea5e9);
}

/* анимация клика */

.click{
position:absolute;
color:#22d3ee;
font-weight:bold;
pointer-events:none;
animation:float 1s forwards;
}

@keyframes float{

0%{opacity:1; transform:translateY(0);}
100%{opacity:0; transform:translateY(-60px);}

}

/* карточки */

.card{

background:#020617;
border:1px solid #0ea5e9;
border-radius:14px;
padding:15px;
margin:12px;
box-shadow:0 0 12px #0284c7;

}

/* кнопки */

button{

padding:10px 15px;
background:#0284c7;
border:none;
border-radius:10px;
color:white;
font-size:14px;
margin-top:10px;

}

/* нижнее меню */

.menu{

position:fixed;
bottom:0;
width:100%;
background:#020617;
border-top:1px solid #0ea5e9;
display:flex;
justify-content:space-around;
padding:10px 0;

}

.menu button{

background:none;
color:#38bdf8;
font-size:13px;

}

/* панели */

.panel{
display:none;
padding-bottom:80px;
}

</style>

</head>

<body>

<div class="topbar">

<div class="balance">💰 <span id="balance">0</span></div>
<div class="energy">⚡ Энергия: <span id="energy">100</span></div>

</div>

<div id="game">

<img id="fish" src="https://cdn-icons-png.flaticon.com/512/616/616430.png">

</div>

<div id="shop" class="panel">

<div class="card">

Улучшение клика (+1)  
<br>
<button onclick="upgradeTap()">Купить (100)</button>

</div>

<div class="card">

Пассивный доход (+1/сек)  
<br>
<button onclick="upgradePassive()">Купить (200)</button>

</div>

</div>

<div id="top" class="panel">

<div class="card">

🏆 Топ игроков

<ol id="leaders"></ol>

</div>

</div>

<div id="invite" class="panel">

<div class="card">

👥 Пригласи друзей

<br><br>

<input id="refLink" style="width:90%">

<br><br>

<button onclick="copyRef()">Скопировать</button>

</div>

</div>

<div id="donate" class="panel">

<div class="card">

💎 Поддержать разработчика

<br><br>

<button onclick="donate()">Отправить донат</button>

</div>

</div>

<div class="menu">

<button onclick="openPanel('game')">Игра</button>
<button onclick="openPanel('shop')">Магазин</button>
<button onclick="openPanel('top')">Топ</button>
<button onclick="openPanel('invite')">Друзья</button>
<button onclick="openPanel('donate')">Донат</button>

</div>

<script>

const tg = window.Telegram.WebApp
tg.expand()

let balance=0
let energy=100
let tapPower=1
let passive=0

const fish=document.getElementById("fish")

fish.onclick=function(e){

if(energy<=0) return

balance+=tapPower
energy--

animate(e)

update()

}

function animate(e){

fish.style.transform="scale(.9)"

setTimeout(()=>fish.style.transform="scale(1)",100)

let el=document.createElement("div")

el.className="click"
el.innerText="+"+tapPower

el.style.left=e.pageX+"px"
el.style.top=e.pageY+"px"

document.body.appendChild(el)

setTimeout(()=>el.remove(),1000)

}

function upgradeTap(){

if(balance>=100){

balance-=100
tapPower++
update()

}

}

function upgradePassive(){

if(balance>=200){

balance-=200
passive++
update()

}

}

setInterval(()=>{

balance+=passive

if(energy<100) energy++

update()

},1000)

function update(){

document.getElementById("balance").innerText=Math.floor(balance)
document.getElementById("energy").innerText=energy

save()

}

function openPanel(id){

document.querySelectorAll(".panel").forEach(p=>p.style.display="none")

if(id!=="game")
document.getElementById(id).style.display="block"

}

function donate(){

window.open("https://t.me/IvaN_Goodi")

}

function copyRef(){

navigator.clipboard.writeText(document.getElementById("refLink").value)

}

function ref(){

let id=tg.initDataUnsafe?.user?.id || Math.floor(Math.random()*999999)

let link="https://t.me/YOUR_BOT?start="+id

document.getElementById("refLink").value=link

}

function leaderboard(){

let data=JSON.parse(localStorage.getItem("leaders")||"[]")

data.push(balance)

data.sort((a,b)=>b-a)

data=data.slice(0,5)

localStorage.setItem("leaders",JSON.stringify(data))

let list=document.getElementById("leaders")

list.innerHTML=""

data.forEach(v=>{

let li=document.createElement("li")

li.innerText=v

list.appendChild(li)

})

}

function save(){

localStorage.setItem("fishgame",JSON.stringify({balance,energy,tapPower,passive}))

}

function load(){

let d=JSON.parse(localStorage.getItem("fishgame"))

if(!d) return

balance=d.balance
energy=d.energy
tapPower=d.tapPower
passive=d.passive

}

load()
ref()
leaderboard()
update()

</script>

</body>
</html>
